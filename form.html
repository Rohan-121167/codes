<body>
    <form>
        <label for="name">Name:</label>
        <input id="name" type="text" name="name" placeholder="Enter your name" title="Full name" required><br><br>
        <label for="email">Email:</label>
        <input id="email" type="email" name="email" placeholder="Enter your email" title="Email address" required><br><br>
        <label for="phone">Ph.no:</label>
        <input id="phone" type="tel" name="phone" placeholder="Enter your phone number" title="Phone number" required><br><br>
        <label for="dob">DOB:</label>
        <input id="dob" type="date" name="dob" title="Date of birth" required><br><br>
        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter your address" title="Postal address" required></textarea><br><br>
        <label for="skills-html">
            <input id="skills-html" type="checkbox" name="skills" value="HTML" title="Select HTML skill">
            Skills: HTML
        </label><br><br>
        <label for="resume">Resume:</label>
        <input id="resume" type="file" name="resume" title="Upload resume" required><br><br>
        <label for="date">Date:</label>
        <input id="date" type="date" name="date" title="Registration date" required><br><br>
        <input type="submit" value="Register">
    </form>
</body>
